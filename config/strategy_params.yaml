breakout_long_call:
  name: "Breakout Long Calls"
  setup_type: "breakout_of_resistance"
  min_volume_breakout: 1.5  # 1.5x avg volume required
  min_risk_reward: 1.5      # Min payoff ratio
  max_dte: 45               # Days to expiration
  min_delta: 0.30
  max_delta: 0.80
  exit_rule: "multi_level_scale_out"
  scale_out_levels:
    - { price_pct: 0.015, qty_pct: 0.33, reason: "first_resistance" }
    - { price_pct: 0.030, qty_pct: 0.33, reason: "breakout_level" }
    - { price_pct: 0.045, qty_pct: 0.34, reason: "max_target" }

support_bounce_long_call:
  name: "Support Bounce Long Calls"
  setup_type: "support_bounce"
  min_bounce_height: 0.005   # 0.5% min bounce
  max_dte: 30
  min_delta: 0.40
  max_delta: 0.75
  exit_rule: "time_based_stop"
  time_stop_days: 3

breakout_long_put:
  name: "Breakout Long Puts"
  setup_type: "breakout_of_support"
  min_volume_breakout: 1.5
  min_risk_reward: 1.5
  max_dte: 45
  min_delta: -0.80
  max_delta: -0.30
  exit_rule: "multi_level_scale_out"
  scale_out_levels:
    - { price_pct: -0.015, qty_pct: 0.33, reason: "first_support" }
    - { price_pct: -0.030, qty_pct: 0.33, reason: "breakdown_level" }
    - { price_pct: -0.045, qty_pct: 0.34, reason: "max_target" }
